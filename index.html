<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>특이점이 온다 — 독서 모임 대시보드</title>
<style>
  :root {
    --bg: #faf7f2;
    --surface: #ffffff;
    --ink: #1f1b16;
    --ink-soft: #6b6359;
    --line: #e8e2d8;
    --accent: #5b4636;
    --accent-soft: #ede4d3;
    --ok: #4a7c59;
    --ok-bg: #e3efe6;
    --late: #b8860b;
    --late-bg: #fbf2dc;
    --miss: #b04a4a;
    --miss-bg: #f8e3e3;
    --pending: #c9c2b6;
    --pending-bg: #f3efe7;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Apple SD Gothic Neo", "Malgun Gothic", sans-serif;
    background: var(--bg);
    color: var(--ink);
    line-height: 1.5;
  }
  .wrap { max-width: 1080px; margin: 0 auto; padding: 32px 24px 80px; }

  header.hero {
    border-bottom: 1px solid var(--line);
    padding-bottom: 20px;
    margin-bottom: 24px;
  }
  header.hero h1 {
    margin: 0 0 6px;
    font-size: 24px;
    letter-spacing: -0.01em;
  }
  header.hero .meta {
    color: var(--ink-soft);
    font-size: 13px;
  }
  header.hero .meta span + span::before {
    content: " · ";
    margin: 0 4px;
    color: var(--line);
  }

  section { margin-bottom: 28px; }
  section h2 {
    font-size: 14px;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    color: var(--ink-soft);
    font-weight: 600;
    margin: 0 0 12px;
  }

  .cards { display: grid; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); gap: 12px; }
  .card {
    background: var(--surface);
    border: 1px solid var(--line);
    border-radius: 10px;
    padding: 16px 18px;
  }
  .card .label { color: var(--ink-soft); font-size: 12px; }
  .card .value { font-size: 28px; font-weight: 600; margin-top: 4px; letter-spacing: -0.02em; }
  .card .sub { font-size: 12px; color: var(--ink-soft); margin-top: 4px; }

  .person-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 12px; }
  .person {
    background: var(--surface);
    border: 1px solid var(--line);
    border-radius: 10px;
    padding: 18px;
  }
  .person .name {
    font-size: 16px;
    font-weight: 600;
    display: flex;
    justify-content: space-between;
    align-items: baseline;
  }
  .person .pct { font-size: 22px; font-weight: 700; color: var(--accent); }
  .person .bar { height: 6px; background: var(--accent-soft); border-radius: 3px; margin: 10px 0 12px; overflow: hidden; }
  .person .bar > div { height: 100%; background: var(--accent); border-radius: 3px; transition: width 0.4s ease; }
  .person .stats { font-size: 12px; color: var(--ink-soft); display: flex; gap: 14px; }
  .person .stats b { color: var(--ink); font-weight: 600; }

  table.matrix {
    width: 100%;
    border-collapse: separate;
    border-spacing: 0;
    background: var(--surface);
    border: 1px solid var(--line);
    border-radius: 10px;
    overflow: hidden;
    font-size: 13px;
  }
  table.matrix th, table.matrix td {
    padding: 8px 10px;
    text-align: center;
    border-bottom: 1px solid var(--line);
  }
  table.matrix th {
    background: #f5f0e6;
    font-weight: 600;
    color: var(--ink);
    font-size: 12px;
  }
  table.matrix th:first-child, table.matrix td:first-child { text-align: left; padding-left: 16px; }
  table.matrix th:last-child, table.matrix td:last-child { padding-right: 16px; }
  table.matrix tr:last-child td { border-bottom: none; }
  table.matrix tr.today { background: #fffaf0; }
  table.matrix tr.today td:first-child { font-weight: 600; }
  table.matrix .pages { color: var(--ink-soft); font-size: 11px; margin-left: 6px; }
  .cell {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    width: 100%;
    min-height: 22px;
    border-radius: 6px;
    font-size: 12px;
    font-weight: 600;
    padding: 2px 0;
  }
  .cell.ok { color: var(--ok); background: var(--ok-bg); }
  .cell.late { color: var(--late); background: var(--late-bg); }
  .cell.miss { color: var(--miss); background: var(--miss-bg); }
  .cell.pending { color: var(--pending); background: var(--pending-bg); }
  .cell .date { font-weight: 400; opacity: 0.75; margin-left: 4px; font-size: 11px; }

  .legend { display: flex; gap: 12px; font-size: 12px; color: var(--ink-soft); margin-bottom: 10px; flex-wrap: wrap; }
  .legend .item { display: inline-flex; align-items: center; gap: 4px; }
  .legend .dot { width: 10px; height: 10px; border-radius: 3px; }

  .drop {
    display: block;
    border: 2px dashed var(--line);
    border-radius: 12px;
    padding: 32px;
    text-align: center;
    color: var(--ink-soft);
    background: var(--surface);
    transition: all 0.2s;
    cursor: pointer;
  }
  .drop > div { margin-bottom: 4px; }
  .drop.over { border-color: var(--accent); background: var(--accent-soft); color: var(--accent); }
  .drop button {
    display: inline-block;
    margin-top: 10px;
    background: var(--accent);
    color: white;
    border: none;
    padding: 8px 18px;
    border-radius: 6px;
    cursor: pointer;
    font-size: 13px;
  }
  .drop input[type=file] { display: none; }
  .source {
    font-size: 12px;
    color: var(--ink-soft);
    margin-top: 14px;
    text-align: right;
  }
  .empty {
    text-align: center;
    padding: 40px 20px;
    color: var(--ink-soft);
    font-size: 14px;
  }
  .err {
    background: var(--miss-bg);
    color: var(--miss);
    padding: 10px 14px;
    border-radius: 8px;
    font-size: 13px;
    margin-top: 10px;
  }
  @media (max-width: 600px) {
    .wrap { padding: 20px 16px 60px; }
    table.matrix { font-size: 12px; }
    table.matrix th, table.matrix td { padding: 6px 6px; }
    table.matrix th:first-child, table.matrix td:first-child { padding-left: 10px; }
    table.matrix th:last-child, table.matrix td:last-child { padding-right: 10px; }
    .cell { font-size: 11px; }
  }
</style>
</head>
<body>
<div class="wrap">
  <header class="hero">
    <h1>특이점이 온다 · 독서 모임</h1>
    <div class="meta">
      <span>레이 커즈와일</span>
      <span id="m-range">p.11 ~ p.686 (총 676쪽)</span>
      <span id="m-schedule">23회차 · 월~금 30쪽/일</span>
      <span id="m-period">2026-05-11 → 2026-06-10</span>
    </div>
  </header>

  <section id="overview">
    <h2>한눈에</h2>
    <div class="cards" id="cards"></div>
  </section>

  <section id="people">
    <h2>참여자별 진행률</h2>
    <div class="person-grid" id="people-grid"></div>
  </section>

  <section id="matrix-section">
    <h2>회차별 현황</h2>
    <div class="legend">
      <span class="item"><span class="dot" style="background: var(--ok-bg); border: 1px solid var(--ok);"></span> 정시 완료</span>
      <span class="item"><span class="dot" style="background: var(--late-bg); border: 1px solid var(--late);"></span> 주말 만회</span>
      <span class="item"><span class="dot" style="background: var(--miss-bg); border: 1px solid var(--miss);"></span> 누락</span>
      <span class="item"><span class="dot" style="background: var(--pending-bg); border: 1px solid var(--pending);"></span> 예정</span>
    </div>
    <table class="matrix" id="matrix"></table>
  </section>

  <section id="upload-section" style="display:none">
    <h2>카톡 대화 업로드</h2>
    <label class="drop" id="drop">
      <div>여기에 카카오톡 대화 내보내기(<b>.txt</b>) 파일을 놓거나</div>
      <button type="button" id="browse-btn">파일 선택</button>
      <input type="file" id="file-input" accept=".txt,text/plain">
      <div class="source" id="source-note"></div>
    </label>
    <div id="err" class="err" style="display:none"></div>
  </section>
</div>

<script>
const CONFIG = {
  members: ['규리', '진영', '유리'],
  startDate: '2026-05-11',
  totalSessions: 23,
  startPage: 11,
  endPage: 686,
  pagesPerSession: 30,
  today: null,
};

function pad(n) { return String(n).padStart(2, '0'); }
function fmtDate(d) { return `${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())}`; }
function fmtShort(d) { return `${d.getMonth()+1}/${d.getDate()}`; }
function parseDate(s) {
  const [y, m, d] = s.split('-').map(Number);
  return new Date(y, m-1, d);
}
function dayOfWeek(d) { return ['일','월','화','수','목','금','토'][d.getDay()]; }
function diffDays(a, b) {
  return Math.round((a - b) / 86400000);
}

function generateSchedule() {
  const sched = [];
  const start = parseDate(CONFIG.startDate);
  let cur = new Date(start);
  for (let i = 1; i <= CONFIG.totalSessions; i++) {
    while (cur.getDay() === 0 || cur.getDay() === 6) cur.setDate(cur.getDate()+1);
    const sp = CONFIG.startPage + (i-1) * CONFIG.pagesPerSession;
    const ep = Math.min(CONFIG.startPage + i * CONFIG.pagesPerSession - 1, CONFIG.endPage);
    sched.push({ session: i, date: new Date(cur), startPage: sp, endPage: ep });
    cur.setDate(cur.getDate()+1);
  }
  return sched;
}

function parseChat(text) {
  const completions = [];
  const namePattern = CONFIG.members.join('|');
  const re = new RegExp(`(\\d{1,2})[\\/.](\\d{1,2})\\s+(${namePattern})\\s*_\\s*(\\d+)\\s*회\\s*차\\s*미\\s*션\\s*완\\s*료`, 'g');
  const year = parseDate(CONFIG.startDate).getFullYear();
  let m;
  const seen = new Set();
  while ((m = re.exec(text)) !== null) {
    const month = +m[1], day = +m[2], name = m[3], session = +m[4];
    const key = `${name}|${session}`;
    if (seen.has(key)) continue;
    seen.add(key);
    completions.push({
      name, session,
      claimedDate: new Date(year, month-1, day),
    });
  }
  return completions;
}

function getToday() {
  if (CONFIG.today) return parseDate(CONFIG.today);
  const t = new Date();
  return new Date(t.getFullYear(), t.getMonth(), t.getDate());
}

function classify(comp, sched, today) {
  if (!comp) {
    if (today < sched.date) return { kind: 'pending', label: '예정' };
    return { kind: 'miss', label: '미완료' };
  }
  const claimed = comp.claimedDate;
  if (diffDays(claimed, sched.date) <= 0) return { kind: 'ok', label: '✓', date: fmtShort(claimed) };
  const dow = claimed.getDay();
  if (dow === 0 || dow === 6) return { kind: 'late', label: '만회', date: fmtShort(claimed) };
  return { kind: 'late', label: '지각', date: fmtShort(claimed) };
}

function render(completions) {
  const sched = generateSchedule();
  const today = getToday();
  const byPerson = {};
  CONFIG.members.forEach(n => byPerson[n] = {});
  completions.forEach(c => { byPerson[c.name][c.session] = c; });

  const elapsedSessions = sched.filter(s => s.date <= today).length;
  const totalDone = completions.length;
  const totalExpected = elapsedSessions * CONFIG.members.length;

  const todayIdx = sched.findIndex(s => fmtDate(s.date) === fmtDate(today));
  let todayLabel;
  if (todayIdx === -1) {
    const next = sched.find(s => s.date > today);
    if (next) todayLabel = `다음 회차: ${next.session}회 (${fmtShort(next.date)})`;
    else if (today > sched[sched.length-1].date) todayLabel = '모임 종료';
    else todayLabel = '주말';
  } else {
    todayLabel = `오늘은 ${sched[todayIdx].session}회차`;
  }

  document.getElementById('cards').innerHTML = `
    <div class="card">
      <div class="label">오늘</div>
      <div class="value">${fmtShort(today)} (${dayOfWeek(today)})</div>
      <div class="sub">${todayLabel}</div>
    </div>
    <div class="card">
      <div class="label">전체 완료율</div>
      <div class="value">${totalExpected ? Math.round(totalDone/totalExpected*100) : 0}%</div>
      <div class="sub">${totalDone} / ${totalExpected}건 (지금까지)</div>
    </div>
    <div class="card">
      <div class="label">남은 회차</div>
      <div class="value">${CONFIG.totalSessions - elapsedSessions}</div>
      <div class="sub">총 ${CONFIG.totalSessions}회 중 ${elapsedSessions}회 경과</div>
    </div>
  `;

  document.getElementById('people-grid').innerHTML = CONFIG.members.map(name => {
    const done = Object.keys(byPerson[name]).length;
    const onTime = Object.values(byPerson[name]).filter(c => {
      const s = sched[c.session-1];
      return s && diffDays(c.claimedDate, s.date) <= 0;
    }).length;
    const expected = elapsedSessions;
    const behind = Math.max(0, expected - done);
    const pct = expected ? Math.round(done/expected*100) : 0;
    return `
      <div class="person">
        <div class="name"><span>${name}</span><span class="pct">${pct}%</span></div>
        <div class="bar"><div style="width:${Math.min(100,pct)}%"></div></div>
        <div class="stats">
          <span><b>${done}</b>/${expected} 완료</span>
          <span><b>${onTime}</b> 정시</span>
          <span style="color:${behind>0?'var(--miss)':'var(--ink-soft)'}"><b>${behind}</b> 밀림</span>
        </div>
      </div>
    `;
  }).join('');

  const headRow = `<tr><th>회차</th>${CONFIG.members.map(n => `<th>${n}</th>`).join('')}</tr>`;
  const bodyRows = sched.map(s => {
    const isToday = fmtDate(s.date) === fmtDate(today);
    const cells = CONFIG.members.map(name => {
      const c = byPerson[name][s.session];
      const r = classify(c, s, today);
      const dateStr = r.date ? `<span class="date">${r.date}</span>` : '';
      return `<td><span class="cell ${r.kind}">${r.label}${dateStr}</span></td>`;
    }).join('');
    const label = `${s.session}회 <span class="pages">${fmtShort(s.date)}(${dayOfWeek(s.date)}) · p.${s.startPage}~${s.endPage}</span>`;
    return `<tr${isToday?' class="today"':''}><td>${label}</td>${cells}</tr>`;
  }).join('');
  document.getElementById('matrix').innerHTML = headRow + bodyRows;
}

function renderEmpty() {
  document.getElementById('cards').innerHTML = '<div class="empty" style="grid-column:1/-1">아직 데이터가 없어요. 아래에 카톡 대화 파일을 올려주세요.</div>';
  document.getElementById('people-grid').innerHTML = '';
  document.getElementById('matrix').innerHTML = '';
}

function showError(msg) {
  const el = document.getElementById('err');
  el.textContent = msg;
  el.style.display = 'block';
}

function loadText(text, source) {
  try {
    const comps = parseChat(text);
    render(comps);
    document.getElementById('source-note').textContent = `${source} · ${comps.length}건 인식`;
    document.getElementById('err').style.display = 'none';
  } catch (e) {
    showError(`파싱 실패: ${e.message}`);
  }
}

const dropEl = document.getElementById('drop');
const fileInput = document.getElementById('file-input');
document.getElementById('browse-btn').onclick = (e) => { e.preventDefault(); fileInput.click(); };
fileInput.onchange = (e) => {
  const f = e.target.files[0];
  if (!f) return;
  const r = new FileReader();
  r.onload = () => loadText(r.result, `로컬 파일: ${f.name}`);
  r.readAsText(f, 'UTF-8');
};
['dragenter','dragover'].forEach(ev => dropEl.addEventListener(ev, e => { e.preventDefault(); dropEl.classList.add('over'); }));
['dragleave','drop'].forEach(ev => dropEl.addEventListener(ev, e => { e.preventDefault(); dropEl.classList.remove('over'); }));
dropEl.addEventListener('drop', e => {
  const f = e.dataTransfer.files[0];
  if (!f) return;
  const r = new FileReader();
  r.onload = () => loadText(r.result, `로컬 파일: ${f.name}`);
  r.readAsText(f, 'UTF-8');
});

document.getElementById('upload-section').style.display = 'block';

fetch('chat.txt?_=' + Date.now())
  .then(r => r.ok ? r.text() : Promise.reject())
  .then(text => loadText(text, 'chat.txt (자동 로드)'))
  .catch(() => renderEmpty());
</script>
</body>
</html>
